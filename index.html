<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prophet AI | Financial State Predictor</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --gold: #d4af37;
            --success: #00ffcc;
            --fail: #ff4d4d;
            --bg: #05070a;
        }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(145deg, #0f1218, #161b22);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--gold);
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        /* The Illusion Scanner */
        .scanner-vault {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 25px auto;
            border-radius: 50%;
            padding: 10px;
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
        }

        .illusion-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, #05070a 0deg 15deg, var(--gold) 15deg 30deg);
            animation: spin 3s linear infinite;
            opacity: 0.8;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .scanner-active .illusion-ring {
            animation-duration: 0.5s;
            filter: hue-rotate(90deg);
        }

        .status-box {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid var(--gold);
        }

        #prediction-text {
            font-weight: 600;
            font-size: 0.9rem;
            color: #aaa;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #222;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        #bar {
            width: 0%;
            height: 100%;
            background: var(--gold);
            transition: width 0.1s linear;
        }

        .instruction {
            font-size: 0.8rem;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Prophet Intelligence</h1>
        <div id="sub-tag">Biometric Wealth Analysis</div>
    </div>

    <div class="scanner-vault" id="scanner" onmousedown="startAnalysis()" onmouseup="stopVisual()">
        <div class="illusion-ring"></div>
    </div>

    <div class="status-box">
        <div id="prediction-text">SYSTEM READY: TAP & HOLD SCANNER</div>
    </div>

    <div class="progress-container">
        <div id="bar"></div>
    </div>

    <p class="instruction">Scan requires 30 seconds of rhythmic interaction to calibrate neuro-financial response.</p>
</div>

<script>
    let clicks = [];
    let startTime = null;
    let timer = null;
    const duration = 30000; // 30 seconds

    function startAnalysis() {
        if (startTime) {
            // Already running, just log the tap
            clicks.push(Date.now());
            return;
        }

        // Initialize session
        startTime = Date.now();
        clicks = [startTime];
        document.getElementById('scanner').classList.add('scanner-active');
        document.getElementById('prediction-text').innerText = "ANALYZING DOPAMINE LEVELS...";

        timer = setInterval(() => {
            const now = Date.now();
            const elapsed = now - startTime;
            const percent = (elapsed / duration) * 100;
            document.getElementById('bar').style.width = percent + "%";

            if (elapsed >= duration) {
                clearInterval(timer);
                calculateProphecy();
            }
        }, 100);
    }

    function stopVisual() {
        // Visual feedback only, logic continues until 30s
        document.getElementById('scanner').classList.remove('scanner-active');
    }

    function calculateProphecy() {
        const totalClicks = clicks.length;
        const display = document.getElementById('prediction-text');
        const bar = document.getElementById('bar');
        
        // Algorithm: Reward Instinct vs Anxiety Instinct
        // Money seekers with 100% certainty usually hit 2-3 taps per second (60-90 total)
        
        let result = "";
        let finalColor = "";

        if (totalClicks > 70) {
            result = "PROPHESY: REWARD SIGNAL DETECTED. MONEY IS COMING 100%.";
            finalColor = "#00ffcc";
        } else if (totalClicks >= 40 && totalClicks <= 70) {
            result = "PROPHESY: TRANSITION STATE. PARTIAL FUNDS EXPECTED.";
            finalColor = "#d4af37";
        } else {
            result = "PROPHESY: NO REWARD SIGNAL. FINANCIAL DELAY LIKELY.";
            finalColor = "#ff4d4d";
        }

        display.innerText = result;
        display.style.color = finalColor;
        bar.style.backgroundColor = finalColor;
        startTime = null; // Reset for next use
    }
</script>

</body>
</html>
